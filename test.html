<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sassou Élagage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f5;}
header { background:white; text-align:center; padding:10px; border-bottom:2px solid #4CAF50;}
header img { max-width:90px;}

.container { padding:15px;}
input, select, button {
    width:100%; padding:12px; margin:6px 0;
}

button {
    background:#4CAF50; color:white; border:none;
}

.result {
    background:white; padding:15px;
    font-size:20px; text-align:center;
    margin-top:10px;
}

canvas {
    border:1px solid #ccc;
    width:100%;
    height:150px;
    background:white;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h3>SASSOU ÉLAGAGE</h3>
</header>

<div class="container">

<h3>Client</h3>
<input id="client" placeholder="Nom client">
<input id="adresse" placeholder="Adresse">

<h3>Arbre</h3>
<input id="diametre" type="number" placeholder="Diamètre (cm)">
<input id="vu" type="number" placeholder="Valeur unitaire">

<h3>Espèce</h3>
<select id="ce">
<option value="1">Standard</option>
<option value="1.2">Intéressante</option>
<option value="1.5">Remarquable</option>
</select>

<h3>État</h3>
<select id="cs">
<option value="0.5">Mauvais</option>
<option value="0.8">Moyen</option>
<option value="1">Bon</option>
</select>

<h3>Localisation</h3>
<select id="cl">
<option value="0.7">Peu visible</option>
<option value="1">Visible</option>
<option value="1.5">Remarquable</option>
</select>

<h3>Photo</h3>
<input type="file" id="photo">

<h3>Signature client</h3>
<canvas id="signature"></canvas>
<button onclick="clearSignature()">Effacer signature</button>

<button onclick="calcul()">Calculer</button>
<button onclick="pdf()">Générer PDF PRO</button>

<div class="result" id="result">Valeur : 0 €</div>

</div>

<script>
let valeurGlobale = 0;

// SIGNATURE
let canvas = document.getElementById("signature");
let ctx = canvas.getContext("2d");
let dessin = false;

canvas.addEventListener("mousedown", () => dessin = true);
canvas.addEventListener("mouseup", () => dessin = false);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", () => dessin = true);
canvas.addEventListener("touchend", () => dessin = false);
canvas.addEventListener("touchmove", drawTouch);

function draw(e) {
    if (!dessin) return;
    ctx.lineWidth = 2;
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
}

function drawTouch(e) {
    e.preventDefault();
    let rect = canvas.getBoundingClientRect();
    ctx.lineTo(e.touches[0].clientX - rect.left,
               e.touches[0].clientY - rect.top);
    ctx.stroke();
}

function clearSignature() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

// CALCUL
function calcul() {
    let d = diametre.value;
    let vu = vuInput.value;
    let ce = ceInput.value;
    let cs = csInput.value;
    let cl = clInput.value;

    let surface = Math.PI * Math.pow(d/2, 2);
    let valeur = surface * vu * ce * cs * cl;

    valeurGlobale = Math.round(valeur);
    result.innerHTML = "Valeur : " + valeurGlobale + " €";
}

// PDF
function pdf() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.setFontSize(16);
    doc.text("SASSOU ÉLAGAGE", 10, 10);

    doc.setFontSize(12);
    doc.text("Client : " + client.value, 10, 30);
    doc.text("Adresse : " + adresse.value, 10, 40);
    doc.text("Valeur : " + valeurGlobale + " €", 10, 60);

    // signature
    let sign = canvas.toDataURL();
    doc.addImage(sign, 'PNG', 10, 80, 100, 40);

    doc.save("rapport_sassou.pdf");
}

// raccourcis
let diametre = document.getElementById("diametre");
let vuInput = document.getElementById("vu");
let ceInput = document.getElementById("ce");
let csInput = document.getElementById("cs");
let clInput = document.getElementById("cl");
let result = document.getElementById("result");
</script>

</body>
</html>
